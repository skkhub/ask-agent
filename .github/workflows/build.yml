name: Build executable

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact: ask-macos-arm64
          - os: macos-13
            artifact: ask-macos-x64
          - os: ubuntu-latest
            artifact: ask-linux-x64
          - os: windows-latest
            artifact: ask-windows-x64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "23.6"
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Rename artifact (Unix)
        if: runner.os != 'Windows'
        run: cp dist/ask "${{ matrix.artifact }}"

      - name: Rename artifact (Windows)
        if: runner.os == 'Windows'
        run: copy dist\ask.exe ${{ matrix.artifact }}
        shell: cmd

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
